name: Apply v21 to WIP from main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-v21-to-wip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout WIP
        uses: actions/checkout@v4
        with:
          ref: WIP
          fetch-depth: 0
      - name: Apply v21 WIP marker patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          start = text.find('<style id="wip-v21-adjustments-css">')
          if start != -1:
              end = text.find('</script>', start)
              if end != -1:
                  text = text[:start] + text[end + len('</script>'):]
          patch = '''
<style id="wip-v21-adjustments-css">
.v21-terrain-france-wrap { display:inline-flex; align-items:center; gap:.45rem; }
.v21-france-mini { width:27px; height:27px; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; background:linear-gradient(135deg,#eff6ff,#fef3c7); border:1px solid rgba(234,179,8,.45); box-shadow:0 6px 16px rgba(15,23,42,.12); flex:0 0 auto; }
.dark .v21-france-mini { background:linear-gradient(135deg,#0f172a,#422006); border-color:rgba(234,179,8,.55); }
.v21-france-mini svg { width:18px; height:18px; display:block; }
.v21-irium-under-siret { margin-top:.22rem; display:inline-flex; align-items:center; gap:.25rem; font-size:10px; line-height:1.1; font-weight:900; color:#1d4ed8; background:#eff6ff; border:1px solid #bfdbfe; border-radius:999px; padding:.16rem .38rem; }
.dark .v21-irium-under-siret { color:#93c5fd; background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.32); }
</style>
<script id="wip-v21-adjustments-js">
(function(){
  const PATCH_ID='v21-WIP-2026-06-29';
  window.__WIP_VERSION__=PATCH_ID;
  function esc(v){ try { return escapeHtml(v); } catch(e){ return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); } }
  function getIriumV21(item){ const keys=[]; try{ if(COL && COL.clientNumero) keys.push(COL.clientNumero); }catch(e){} keys.push('Client_Irium.Client (Numéro)','Client_Irium.Client Numéro','Client_Irium.Client','Client (Numéro)','Numéro client','Numero client','N° client','Num client','Code Irium','Code client Irium','Client Irium'); for(const k of keys){ const v=item&&item[k]; if(v!==undefined&&v!==null&&String(v).trim()!=='') return String(v).trim(); } return ''; }
  window.getIriumV21=getIriumV21;
  function franceMiniSvgV21(){ return `<span class="v21-france-mini" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none"><path d="M30.4 4.5 42 8.4l3 8.1 8.6 5.4-4.2 8.1 5.6 7.9-8 2.7-2.4 9.9-11.2-1.2-7.1 7.7-8.7-7.8-8.2.6-.8-9-6.2-6 4.2-8.2-3-8.6 9.4-2.7 5.4-8.8 8.2 2.7 3.8-4.7Z" fill="#2563eb" stroke="#1e3a8a" stroke-width="2" stroke-linejoin="round"/><path d="M22 9.2c6 8.1 7.3 21.5 4.1 42" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".9"/><path d="M39 7.8c-3.8 12.1-3.2 25.7 3.2 42.3" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity=".95"/></svg></span>`; }
  function patchMonTerrainButtonV21(){ const btn=document.getElementById('v18-terrain-button'); if(!btn||btn.dataset.v21France) return; btn.dataset.v21France='1'; btn.innerHTML=`<span class="v21-terrain-france-wrap">${franceMiniSvgV21()}<span>Mon terrain</span></span>`; btn.title='Afficher mon terrain par département'; }
  function installRenderGridV21(){ if(window.__v21RenderGridInstalled||typeof renderGrid!=='function') return; window.__v21RenderGridInstalled=true; renderGrid=function(data){ if(typeof renderMobileGridCards==='function') renderMobileGridCards(data); const tbody=document.getElementById('grid-tbody'); if(!tbody) return; if(!data||!data.length){ tbody.innerHTML='<tr><td colspan="6" class="p-8 text-center text-sm text-gray-400">Aucun résultat avec les filtres actuels.</td></tr>'; return; } tbody.innerHTML=data.map(item=>{ const amount=getTableFinancialAmount(item); const machines=String(item?.[COL.machines]||'').trim(); const series=String(item?.[COL.series]||'').trim(); const groupe=String(item?.[COL.groupe]||'').trim(); const categorie=String(item?.[COL.categorie]||'').trim(); const position=String(item?.[COL.position]||'').trim(); const irium=getIriumV21(item); return `<tr class="hover:bg-gray-50/80 dark:hover:bg-slate-800/40 transition align-top"><td class="p-4 pl-6"><div class="font-semibold text-gray-900 dark:text-white">${esc(item?.[COL.nom]||'Inconnu')}</div><div class="text-[10px] text-gray-400 mt-1 uppercase tracking-wide">${esc([position,groupe,categorie].filter(Boolean).join(' • '))}</div>${typeof renderBadges==='function'?renderBadges(item):''}</td><td class="p-4 text-xs font-mono text-gray-500"><div>${esc(item?.[COL.siret]||'')}</div>${irium?`<div class="v21-irium-under-siret">N° client : ${esc(irium)}</div>`:'<div class="v21-irium-under-siret">N° client : -</div>'}</td><td class="p-4 text-xs"><div>${esc(item?.[COL.ville]||'')} (${esc(item?._deptNorm||'')})</div><div class="text-[10px] text-gray-400 mt-1 truncate max-w-[260px]">${esc(item?.[COL.adresse]||'')}</div><div class="text-[10px] text-gray-400 mt-1">Agence : ${esc(item?.[COL.agence]||'-')}</div></td><td class="p-4 text-right"><div class="font-bold text-amber-600">${formatMoney(amount)}</div><div class="text-[10px] text-gray-400">CA Global 2025</div></td><td class="p-4 text-xs text-gray-500 dark:text-slate-400"><div class="font-bold text-gray-700 dark:text-slate-200">${formatNumber(parseNumber(item?.[COL.nbMachines]))} machine(s)</div><div class="truncate max-w-[260px] mt-1">${esc(machines||'Aucune machine renseignée')}</div>${series?`<div class="mt-1 text-[10px] text-gray-600 dark:text-slate-300 font-bold truncate max-w-[260px]">N° série : ${esc(series)}</div>`:''}</td><td class="p-4 text-center pr-6">${eyeIconButton(item._rowIndex)}</td></tr>`; }).join(''); }; }
  function installMobileGridV21(){ if(window.__v21MobileGridInstalled||typeof renderMobileGridCards!=='function') return; window.__v21MobileGridInstalled=true; const old=renderMobileGridCards; renderMobileGridCards=function(data){ old(data); document.querySelectorAll('#mobile-grid-cards article').forEach((card,i)=>{ try{ const item=data[i]; if(!item||card.dataset.v21Irium) return; card.dataset.v21Irium='1'; const grid=card.querySelector('.mobile-card-grid'); if(grid&&typeof mobileField==='function') grid.insertAdjacentHTML('beforeend', mobileField('N° client', getIriumV21(item)||'-')); }catch(e){} }); }; }
  function refreshGridV21(){ try{ const rows=Array.isArray(currentFilteredData)&&currentFilteredData.length?currentFilteredData:[]; if(rows.length&&typeof renderGrid==='function') renderGrid(rows); }catch(e){} }
  function initV21(){ patchMonTerrainButtonV21(); installMobileGridV21(); installRenderGridV21(); setTimeout(refreshGridV21,250); setTimeout(refreshGridV21,1200); }
  document.addEventListener('DOMContentLoaded',()=>setTimeout(initV21,500));
  setInterval(()=>{ try{ patchMonTerrainButtonV21(); installMobileGridV21(); installRenderGridV21(); }catch(e){} },1800);
})();
</script>
'''
          text = text.replace('</body>', patch + '\n</body>', 1) if '</body>' in text else text + patch
          p.write_text(text, encoding='utf-8')
          PY
      - name: Check JS
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          text=Path('index.html').read_text(encoding='utf-8')
          Path('check.js').write_text('\n'.join(re.findall(r'<script[^>]*>(.*?)</script>', text, flags=re.S)), encoding='utf-8')
          PY
          node -c check.js
      - name: Commit to WIP
        run: |
          if git diff --quiet -- index.html; then
            echo "No change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply v21 WIP index"
          git push origin WIP
