<!DOCTYPE html>
<html lang="fr" class="light">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMATSU PCS - Dashboard React</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        komatsu: {
                            50: '#fefce8',

<body class="bg-gray-50 text-gray-800 antialiased selection:bg-komatsu-500 selection:text-white dark:bg-slate-900 dark:text-slate-100">
